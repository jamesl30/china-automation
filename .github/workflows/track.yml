name: ews-tracker
on:
  schedule:
    # 6am-10pm Pacific (PDT, UTC-7) every 2h -> 13,15,17,19,21,23,01,03,05 UTC. :17 avoids top-of-hour congestion.
    - cron: "17 13,15,17,19,21,23,1,3,5 * * *"
  workflow_dispatch:             # manual run button for testing
permissions:
  contents: write                # allow committing last_status.json back
jobs:
  track:
    runs-on: ubuntu-latest
    concurrency: ews-tracker     # never overlap runs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tracker
        env:
          TRACKINGMORE_API_KEY: ${{ secrets.TRACKINGMORE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TRACKING_NUMBER: ${{ vars.TRACKING_NUMBER }}
        run: python track.py
      - name: Persist last status
        run: |
          git config user.name  "ews-bot"
          git config user.email "ews-bot@users.noreply.github.com"
          git add last_status.json
          git commit -m "update status [skip ci]" || echo "no change"
          git push
